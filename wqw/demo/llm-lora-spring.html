function openModal(id){
var d=nodeData[id];if(!d)return;
document.getElementById("modalDot").style.background=d.color;
document.getElementById("modalTitle").textContent=d.name;
document.getElementById("modalDate").textContent=d.date;
document.getElementById("modalOrg").textContent=d.org;
document.getElementById("modalPrinciple").innerHTML=d.principle;
var efx=d.effects.map(function(e){return"<span class=effect-tag effect-good>"+e+"</span>"}).join("");
document.getElementById("modalEffects").innerHTML=efx;
var p=d.paper;
var arxivLink=p.arxiv?"<a class=modal-paper-link href=https://arxiv.org/abs/"+p.arxiv+" target=_blank> arXiv:"+p.arxiv+"</a>":"";
document.getElementById("modalPaper").innerHTML="<div class=modal-paper-title>"+p.title+"</div><div class=modal-paper-meta>"+p.authors+" · "+p.venue+"</div>"+arxivLink;
document.getElementById("modalOverlay").classList.add("active");
}

function closeModal(){document.getElementById("modalOverlay").classList.remove("active");}

// 节点点击 → 弹窗
document.querySelectorAll(".node-group").forEach(function(n){
n.addEventListener("click",function(e){
e.stopPropagation();
openModal(this.getAttribute("data-id"));
});
});

document.getElementById("modalOverlay").addEventListener("click",function(e){
if(e.target===this)closeModal();
});

// 拖拽
var dragging=false, curNode=null, sx=0, sy=0, stx=0, sty=0;
document.querySelectorAll(".node-group").forEach(function(n){
n.addEventListener("mousedown",function(e){
if(e.button!==0)return;
dragging=true;curNode=this;this.classList.add("dragging");
var t=this.getAttribute("transform");
var m=t.match(/translate\(\s*([-\d.]+)\s*,\s*([-\d.]+)\s*\)/);
stx=m?parseFloat(m[1]):0;sty=m?parseFloat(m[2]):0;
sx=e.clientX;sy=e.clientY;
e.preventDefault();e.stopPropagation();
});
});
document.addEventListener("mousemove",function(e){
if(!dragging||!curNode)return;
var svg=document.querySelector(".main-chart");
var rect=svg.getBoundingClientRect();
var sx2=1600/rect.width,sy2=1400/rect.height;
curNode.setAttribute("transform","translate("+(stx+(e.clientX-sx)*sx2)+", "+(sty+(e.clientY-sy)*sy2)+")");
});
document.addEventListener("mouseup",function(){
if(dragging&&curNode)curNode.classList.remove("dragging");
dragging=false;curNode=null;
});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});
</script></body></html>
