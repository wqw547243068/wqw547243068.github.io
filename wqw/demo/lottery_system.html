<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎲 算法平台部门 - 随机抽检系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 背景粒子效果 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* 标题样式 */
        .header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px;
            background: linear-gradient(135deg, rgba(255,215,0,0.1) 0%, rgba(255,140,0,0.1) 100%);
            border-radius: 20px;
            border: 2px solid rgba(255,215,0,0.3);
            box-shadow: 0 0 40px rgba(255,215,0,0.2);
        }

        .header h1 {
            font-size: 3em;
            background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
            text-shadow: 0 0 30px rgba(255,215,0,0.5);
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        .header p {
            color: #aaa;
            margin-top: 10px;
            font-size: 1.2em;
        }

        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        /* 抽奖区域 */
        .lottery-section {
            background: rgba(255,255,255,0.05);
            border-radius: 25px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        /* 设置面板 */
        .config-panel {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.15);
        }

        .config-row {
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .config-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .config-label {
            color: #fff;
            font-size: 1em;
            white-space: nowrap;
        }

        .config-input {
            width: 70px;
            padding: 10px 15px;
            font-size: 1.1em;
            font-weight: bold;
            text-align: center;
            border: 2px solid rgba(255,215,0,0.5);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #ffd700;
            outline: none;
            transition: all 0.3s;
        }

        .config-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .pool-info {
            color: #aaa;
            font-size: 0.9em;
            margin-left: auto;
        }

        .pool-info span {
            color: #ffd700;
            font-weight: bold;
        }

        /* 候选池 */
        .candidate-pool {
            margin-bottom: 30px;
        }

        .section-title {
            color: #fff;
            font-size: 1.5em;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #ffd700, #ff8c00);
            border-radius: 2px;
        }

        /* ========== 候选人输入框样式 ========== */
        .candidate-input-container {
            margin-bottom: 20px;
        }

        .candidate-input {
            width: 100%;
            min-height: 100px;
            padding: 15px;
            font-size: 1em;
            line-height: 1.6;
            border: 2px solid rgba(100,149,237,0.5);
            border-radius: 15px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            resize: vertical;
            outline: none;
            transition: all 0.3s;
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        .candidate-input:focus {
            border-color: #6495ed;
            box-shadow: 0 0 20px rgba(100,149,237,0.3);
        }

        .candidate-input::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .input-hint {
            color: #aaa;
            font-size: 0.85em;
            margin-top: 8px;
            padding-left: 5px;
        }

        .input-hint span {
            color: #6495ed;
        }

        .candidates-preview {
            margin-top: 15px;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .preview-title {
            color: #aaa;
            font-size: 0.9em;
            margin-bottom: 10px;
        }

        .preview-count {
            color: #6495ed;
            font-weight: bold;
        }

        .candidates-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .candidate-tag {
            padding: 10px 20px;
            background: linear-gradient(135deg, rgba(100,149,237,0.3), rgba(65,105,225,0.3));
            border: 2px solid rgba(100,149,237,0.5);
            border-radius: 30px;
            color: #fff;
            font-size: 1em;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .candidate-tag:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(100,149,237,0.4);
            background: linear-gradient(135deg, rgba(100,149,237,0.5), rgba(65,105,225,0.5));
        }

        .candidate-tag.excluded {
            opacity: 0.3;
            background: linear-gradient(135deg, rgba(100,100,100,0.2), rgba(80,80,80,0.2));
            border-color: rgba(100,100,100,0.3);
            text-decoration: line-through;
        }

        .candidate-tag.winner {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border-color: #ffd700;
            color: #1a1a2e;
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        .candidate-tag.rolling-highlight {
            background: linear-gradient(135deg, #ff4757, #ff6348);
            border-color: #ff4757;
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,71,87,0.6);
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.5); }
            50% { box-shadow: 0 0 40px rgba(255,215,0,0.8); }
        }
        /* 中奖展示区 */
        .winner-display {
            min-height: 250px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        .winner-cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
            min-height: 120px;
        }

        .winner-card {
            width: 160px;
            height: 220px;
            position: relative;
            transform-style: preserve-3d;
            perspective: 1000px;
            opacity: 0;
            transform: scale(0) rotateY(180deg);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .winner-card.show {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
        }

        .winner-card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: cardFloat 3s ease-in-out infinite;
        }

        @keyframes cardFloat {
            0%, 100% { transform: translateY(0) rotateX(5deg); }
            50% { transform: translateY(-10px) rotateX(-5deg); }
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 
                0 20px 40px rgba(0,0,0,0.5),
                0 0 0 1px rgba(255,255,255,0.1),
                inset 0 1px 0 rgba(255,255,255,0.2);
        }

        .card-front {
            background: linear-gradient(145deg, #ffd700 0%, #ff8c00 50%, #ff6b35 100%);
            transform: rotateY(0deg);
        }

        .card-back {
            background: linear-gradient(145deg, #1a1a2e, #0f3460);
            transform: rotateY(180deg);
            border: 3px solid #ffd700;
        }

        .card-crown {
            font-size: 3em;
            margin-bottom: 8px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            animation: crownBounce 1s ease-in-out infinite;
        }

        @keyframes crownBounce {
            0%, 100% { transform: translateY(0) rotate(-10deg); }
            50% { transform: translateY(-8px) rotate(10deg); }
        }

        .card-name {
            font-size: 1.6em;
            font-weight: bold;
            color: #1a1a2e;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.3);
            margin-bottom: 8px;
        }

        .card-label {
            font-size: 1em;
            color: rgba(26,26,46,0.8);
            background: rgba(255,255,255,0.3);
            padding: 4px 15px;
            border-radius: 15px;
        }

        .card-back .card-crown {
            color: #ffd700;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.8));
        }

        .card-back .card-name {
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
        }

        .card-back .card-label {
            color: #ffd700;
            background: rgba(255,215,0,0.2);
        }

        /* 按钮区域 */
        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .lottery-btn {
            padding: 15px 35px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .lottery-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: left 0.5s;
        }

        .lottery-btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #1a1a2e;
            box-shadow: 0 10px 30px rgba(255,215,0,0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(255,215,0,0.6);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(102,126,234,0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757, #ff6348);
            color: #fff;
            box-shadow: 0 10px 30px rgba(255,71,87,0.4);
            animation: urgentPulse 1s infinite;
        }

        .btn-danger:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(255,71,87,0.6);
        }

        @keyframes urgentPulse {
            0%, 100% { box-shadow: 0 10px 30px rgba(255,71,87,0.4); }
            50% { box-shadow: 0 10px 40px rgba(255,71,87,0.8); }
        }

        .btn-success {
            background: linear-gradient(135deg, #2ed573, #1dd1a1);
            color: #fff;
            box-shadow: 0 10px 30px rgba(46,213,115,0.4);
        }

        .btn-success:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(46,213,115,0.6);
        }

        .lottery-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            animation: none;
        }

        /* 侧边栏 */
        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .history-section, .settings-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
        }

        .history-item {
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(255,140,0,0.1));
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
        }

        .history-item:hover {
            transform: translateX(5px);
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
        }

        .history-item.no-replace {
            background: linear-gradient(135deg, rgba(102,126,234,0.1), rgba(118,75,162,0.1));
            border-color: rgba(102,126,234,0.3);
        }

        .history-item.no-replace:hover {
            background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
        }

        .history-round {
            color: #ffd700;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .history-item.no-replace .history-round {
            color: #a78bfa;
        }

        .history-winners {
            color: #fff;
            font-size: 1em;
        }

        .history-winners span {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
        }

        .history-item.no-replace .history-winners span {
            background: linear-gradient(135deg, #a78bfa, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 设置项 */
        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .setting-item:last-child {
            border-bottom: none;
        }

        .setting-label {
            color: #fff;
            font-size: 1em;
        }

        .toggle-switch {
            width: 50px;
            height: 26px;
            background: rgba(255,255,255,0.2);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active::after {
            left: 26px;
        }

        /* 动画文字 */
        .rolling-text {
            font-size: 3.5em;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,215,0,0.8);
            animation: rollingBlur 0.1s infinite;
        }

        @keyframes rollingBlur {
            0% { filter: blur(0px); transform: scale(1); }
            50% { filter: blur(2px); transform: scale(1.1); }
            100% { filter: blur(0px); transform: scale(1); }
        }

        /* 彩带效果 */
        .confetti-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            overflow: hidden;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0% {
                opacity: 1;
                transform: translateY(-100px) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(100vh) rotate(720deg);
            }
        }

        /* 响应式 */
        @media (max-width: 1100px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            .sidebar {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .history-section, .settings-section {
                flex: 1;
                min-width: 300px;
            }
            .config-row {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* 恭喜文字 */
        .congrats-text {
            font-size: 2.5em;
            background: linear-gradient(90deg, #ffd700, #ff8c00, #ff6b35, #ffd700);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientMove 2s linear infinite;
            text-align: center;
            margin-bottom: 10px;
            opacity: 0;
            transform: scale(0);
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .congrats-text.show {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* 状态显示 */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 10px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #aaa;
            font-size: 0.95em;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ed573;
        }

        .status-dot.rolling {
            background: #ffd700;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <!-- 背景粒子 -->
    <div class="particles" id="particles"></div>
    
    <!-- 彩带容器 -->
    <div class="confetti-container" id="confetti"></div>

    <div class="container">
        <div class="header">
            <h1>🎲 算法平台部门 - 随机抽检系统</h1>
            <p>点击开始抽奖后，再点可立即开奖！</p>
        </div>

        <div class="main-content">
            <div class="lottery-section">
                <!-- 配置面板 -->
                <div class="config-panel">
                    <div class="config-row">
                        <div class="config-item">
                            <span class="config-label">抽奖人数：</span>
                            <input type="number" class="config-input" id="drawCount" value="2" min="1" max="100">
                        </div>
                        <div class="pool-info">
                            总人数：<span id="totalCount">14</span> | 
                            无放回已抽：<span id="drawnCount">0</span> | 
                            可用：<span id="availableCount">14</span>
                        </div>
                    </div>
                </div>

                <!-- 候选池 -->
                <div class="candidate-pool">
                    <h2 class="section-title">候选成员池</h2>
                    <div class="candidate-input-container">
                        <textarea 
                            class="candidate-input" 
                            id="candidateInput" 
                            placeholder="请输入候选人名单，支持空格、逗号、顿号分隔">李正阳 董译锴 李可扬 郑莘 孙硕远 陈子骏 李彤 陈雕 王奇文 谭铃丽 杨亚和 邓哲睿 刘洋 吕振滔</textarea>
                        <div class="input-hint">
                            支持使用 <span>空格</span>、<span>逗号(,)</span>、<span>顿号(、)</span> 分隔多个名单
                        </div>
                        <div class="candidates-preview">
                            <div class="preview-title">已识别 <span class="preview-count" id="previewCount">14</span> 人</div>
                            <div class="candidates-grid" id="candidatesGrid"></div>
                        </div>
                    </div>
                </div>

                <!-- 中奖展示 -->
                <div class="winner-display">
                    <div class="congrats-text" id="congratsText">🎉 恭喜中奖 🎉</div>
                    <div class="winner-cards" id="winnerCards">
                        <div class="rolling-text" id="rollingText">?</div>
                    </div>
                </div>

                <!-- 按钮组 -->
                <div class="button-group">
                    <button class="lottery-btn btn-primary" id="drawBtn" onclick="startDraw()">
                        🎯 开始抽奖（有放回）
                    </button>
                    <button class="lottery-btn btn-secondary" id="noReplaceBtn" onclick="startNoReplaceDraw()">
                        🎲 开始抽奖（无放回）
                    </button>
                    <button class="lottery-btn btn-danger" id="stopBtn" onclick="stopRolling()" disabled>
                        🛑 立即开奖
                    </button>
                    <button class="lottery-btn btn-success" onclick="resetPool()">
                        🔄 重置奖池
                    </button>
                </div>

                <!-- 状态栏 -->
                <div class="status-bar">
                    <div class="status-indicator">
                        <span class="status-dot" id="statusDot"></span>
                        <span id="statusText">点击「开始抽奖」开始滚动</span>
                    </div>
                </div>
            </div>

            <div class="sidebar">
                <!-- 设置 -->
                <div class="settings-section">
                    <h2 class="section-title">抽奖设置</h2>
                    <div class="setting-item">
                        <span class="setting-label">显示动画特效</span>
                        <div class="toggle-switch active" id="animationToggle" onclick="toggleAnimation()"></div>
                    </div>
                    <div class="setting-item">
                        <span class="setting-label">立体卡片效果</span>
                        <div class="toggle-switch active" id="cardToggle" onclick="toggleCard()"></div>
                    </div>
                </div>

                <!-- 历史记录 -->
                <div class="history-section">
                    <h2 class="section-title">往期中奖名单</h2>
                    <div id="historyList"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 状态管理
        let state = {
            isRolling: false,
            drawInterval: null,
            drawnInSession: [],  // 无放回模式已抽中
            currentMode: null,
            currentPool: [],
            drawCount: 2
        };

        // 设置
        let settings = {
            showAnimation: true,
            showCards: true
        };

        // 获取候选人列表（从输入框解析）
        function getCandidatesFromInput() {
            const input = document.getElementById('candidateInput').value;
            // 支持空格、逗号、顿号分隔
            const candidates = input.split(/[\s,;、]+/)
                .map(name => name.trim())
                .filter(name => name.length > 0);
            return [...new Set(candidates)]; // 去重
        }

        // 更新预览
        function updatePreview() {
            const candidates = getCandidatesFromInput();
            document.getElementById('previewCount').textContent = candidates.length;
            renderCandidates(candidates);
            updatePoolInfo();
        }

        // 初始化
        function init() {
            createParticles();
            updatePreview(); // 初始化时解析默认值
            
            // 监听输入框变化
            document.getElementById('candidateInput').addEventListener('input', function() {
                updatePreview();
            });
            
            // 监听人数输入
            document.getElementById('drawCount').addEventListener('change', function() {
                let val = parseInt(this.value);
                const max = getCandidatesFromInput().length;
                if (val < 1) val = 1;
                if (val > max) val = max;
                this.value = val;
            });
        }

        // 创建背景粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }

        // 更新池子信息
        function updatePoolInfo() {
            const allCandidates = getCandidatesFromInput();
            document.getElementById('totalCount').textContent = allCandidates.length;
            document.getElementById('drawnCount').textContent = state.drawnInSession.length;
            document.getElementById('availableCount').textContent = allCandidates.length - state.drawnInSession.length;
        }

        // 渲染候选人（预览模式）
        function renderCandidates(candidates) {
            const grid = document.getElementById('candidatesGrid');
            grid.innerHTML = '';
            
            candidates.forEach(name => {
                const tag = document.createElement('div');
                tag.className = 'candidate-tag';
                tag.textContent = name;
                tag.id = `candidate-${name}`;
                
                if (state.drawnInSession.includes(name)) {
                    tag.classList.add('excluded');
                    tag.title = '无放回模式已抽中';
                }
                
                grid.appendChild(tag);
            });
        }

        // 获取无放回池
        function getNoReplacePool() {
            const allCandidates = getCandidatesFromInput();
            return allCandidates.filter(c => !state.drawnInSession.includes(c));
        }

        // 获取抽奖人数
        function getDrawCount() {
            return parseInt(document.getElementById('drawCount').value) || 2;
        }

        // 切换动画
        function toggleAnimation() {
            settings.showAnimation = !settings.showAnimation;
            document.getElementById('animationToggle').classList.toggle('active');
        }

        // 切换卡片效果
        function toggleCard() {
            settings.showCards = !settings.showCards;
            document.getElementById('cardToggle').classList.toggle('active');
        }

        // 创建中奖者卡片
        function createWinnerCard(name, index) {
            const card = document.createElement('div');
            card.className = 'winner-card';
            card.style.animationDelay = `${index * 0.2}s`;
            
            card.innerHTML = `
                <div class="winner-card-inner">
                    <div class="card-front">
                        <div class="card-crown">👑</div>
                        <div class="card-name">${name}</div>
                        <div class="card-label">#${index + 1}</div>
                    </div>
                    <div class="card-back">
                        <div class="card-crown">⭐</div>
                        <div class="card-name">${name}</div>
                        <div class="card-label">幸运儿</div>
                    </div>
                </div>
            `;
            
            return card;
        }

        // 更新状态
        function updateStatus(rolling) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (rolling) {
                dot.classList.add('rolling');
                text.textContent = '滚动中... 点击「开奖」, 马上开奖！';
            } else {
                dot.classList.remove('rolling');
                text.textContent = '点击「开始抽奖」开始滚动';
            }
        }

        // 禁用/启用按钮
        function setButtonsState(rolling) {
            document.getElementById('drawBtn').disabled = rolling;
            document.getElementById('noReplaceBtn').disabled = rolling;
            document.getElementById('stopBtn').disabled = !rolling;
            document.getElementById('drawCount').disabled = rolling;
            document.getElementById('candidateInput').disabled = rolling;
        }

        // ==========================================
        // 有放回抽样
        // ==========================================
        function startDraw() {
            const count = getDrawCount();
            const pool = getCandidatesFromInput();
            
            if (pool.length === 0) {
                alert('请先在上方输入候选人名单！');
                return;
            }
            
            if (count > pool.length) {
                alert(`候选人不足 ${count} 人！当前共 ${pool.length} 人。`);
                return;
            }
            
            beginRolling(pool, count, 'withReplace');
        }

        // ==========================================
        // 无放回抽样
        // ==========================================
        function startNoReplaceDraw() {
            const count = getDrawCount();
            const pool = getNoReplacePool();
            
            if (pool.length === 0) {
                alert('请先在上方输入候选人名单！');
                return;
            }
            
            if (count > pool.length) {
                alert(`可用候选人不足 ${count} 人！还剩 ${pool.length} 人未抽中。`);
                return;
            }
            
            beginRolling(pool, count, 'noReplace');
        }

        // 开始滚动
        function beginRolling(pool, count, mode) {
            state.isRolling = true;
            state.currentMode = mode;
            state.currentPool = [...pool];
            state.drawCount = count;
            
            setButtonsState(true);
            updateStatus(true);
            
            const display = document.getElementById('winnerCards');
            const congrats = document.getElementById('congratsText');
            
            congrats.classList.remove('show');
            display.innerHTML = '<div class="rolling-text" id="rollingText">?</div>';
            
            const rollingText = document.getElementById('rollingText');
            
            // 开启滚动循环
            state.drawInterval = setInterval(() => {
                const randomName = pool[Math.floor(Math.random() * pool.length)];
                rollingText.textContent = randomName;
                
                // 高亮当前
                document.querySelectorAll('.candidate-tag').forEach(tag => {
                    tag.classList.remove('rolling-highlight');
                });
                const currentTag = document.getElementById(`candidate-${randomName}`);
                if (currentTag) currentTag.classList.add('rolling-highlight');
            }, 80);
        }

        // 停止滚动并开奖
        function stopRolling() {
            if (!state.isRolling) return;
            
            // 停止滚动
            clearInterval(state.drawInterval);
            state.drawInterval = null;
            state.isRolling = false;
            
            const display = document.getElementById('winnerCards');
            const congrats = document.getElementById('congratsText');
            
            // 清除滚动高亮
            document.querySelectorAll('.candidate-tag').forEach(tag => {
                tag.classList.remove('rolling-highlight');
            });
            
            // 确定中奖者
            finalizeWinners(display, congrats);
        }

        // 确定中奖者（单轮内不重复）
        function finalizeWinners(display, congrats) {
            const pool = state.currentPool;
            const count = state.drawCount;
            const mode = state.currentMode;
            
            // 从池中随机抽取count个不重复的人
            const shuffled = [...pool].sort(() => Math.random() - 0.5);
            const winners = shuffled.slice(0, count);
            
            // 无放回模式：更新状态
            if (mode === 'noReplace') {
                state.drawnInSession.push(...winners);
                updatePoolInfo();
                updatePreview(); // 重新渲染以更新excluded状态
            }
            
            // 清空显示区
            display.innerHTML = '';
            
            // 逐个显示中奖者
            showWinnersOneByOne(display, congrats, winners, mode);
        }

        // 逐个显示中奖者
        function showWinnersOneByOne(display, congrats, winners, mode) {
            let index = 0;
            
            function showNext() {
                if (index >= winners.length) {
                    // 全部显示完毕
                    finishDraw(display, congrats, winners, mode);
                    return;
                }
                
                const winner = winners[index];
                
                // 高亮
                const tag = document.getElementById(`candidate-${winner}`);
                if (tag) {
                    tag.classList.remove('excluded');
                    tag.classList.add('winner');
                }
                
                // 创建卡片
                if (settings.showCards) {
                    const card = createWinnerCard(winner, index);
                    display.appendChild(card);
                    setTimeout(() => card.classList.add('show'), 50);
                } else {
                    const nameEl = document.createElement('div');
                    nameEl.className = 'rolling-text';
                    nameEl.textContent = winner;
                    nameEl.style.fontSize = '2.5em';
                    nameEl.style.opacity = '0';
                    nameEl.style.transform = 'scale(0)';
                    nameEl.style.transition = 'all 0.4s';
                    nameEl.style.margin = '10px';
                    display.appendChild(nameEl);
                    setTimeout(() => {
                        nameEl.style.opacity = '1';
                        nameEl.style.transform = 'scale(1)';
                    }, 50);
                }
                
                index++;
                setTimeout(showNext, 500);
            }
            
            showNext();
        }

        // 结束抽奖
        function finishDraw(display, congrats, winners, mode) {
            // 显示恭喜文字
            setTimeout(() => {
                congrats.classList.add('show');
                if (settings.showAnimation) {
                    createConfetti();
                }
                
                // 添加到历史
                addToHistory(winners, mode);
                
                // 重置状态
                setButtonsState(false);
                updateStatus(false);
            }, 400);
        }

        // 创建彩带
        function createConfetti() {
            const container = document.getElementById('confetti');
            container.innerHTML = '';
            
            const colors = ['#ffd700', '#ff8c00', '#ff6b35', '#ff4757', '#2ed573', '#1e90ff', '#a55eea'];
            
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                confetti.style.width = (5 + Math.random() * 10) + 'px';
                confetti.style.height = (5 + Math.random() * 10) + 'px';
                container.appendChild(confetti);
            }
            
            setTimeout(() => {
                container.innerHTML = '';
            }, 5000);
        }

        // 历史计数
        let currentRound = 0;
        function addToHistory(winners, type) {
            currentRound++;
            const historyList = document.getElementById('historyList');
            
            const item = document.createElement('div');
            item.className = type === 'noReplace' ? 'history-item no-replace' : 'history-item';
            
            const typeLabel = type === 'noReplace' ? '无放回' : '有放回';
            const icon = type === 'noReplace' ? '🎲' : '🎯';
            
            item.innerHTML = `
                <div class="history-round">第 ${currentRound} 期（${typeLabel}）</div>
                <div class="history-winners">${icon} ${winners.map(w => `<span>${w}</span>`).join('、')}</div>
            `;
            
            historyList.insertBefore(item, historyList.firstChild);
        }

        // 重置奖池
        function resetPool() {
            // 如果正在抽奖，先停止
            if (state.isRolling) {
                clearInterval(state.drawInterval);
                state.isRolling = false;
            }
            
            state.drawnInSession = [];
            state.currentPool = [];
            state.drawCount = 2;
            
            updatePoolInfo();
            updatePreview();
            
            document.getElementById('winnerCards').innerHTML = '<div class="rolling-text" id="rollingText">?</div>';
            document.getElementById('congratsText').classList.remove('show');
            
            setButtonsState(false);
            updateStatus(false);
            
            // 重置动画
            document.querySelector('.lottery-section').style.animation = 'none';
            setTimeout(() => {
                document.querySelector('.lottery-section').style.animation = '';
            }, 10);
        }

        // 启动
        init();
    </script>
</body>
</html>
