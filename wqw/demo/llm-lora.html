<title>LoRA 进化版本图谱</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f1117;
    color: #e2e8f0;
    font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    min-height: 100vh;
    padding: 40px 20px;
  }
  h1 {
    text-align: center;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    text-align: center;
    color: #64748b;
    font-size: 13px;
    margin-bottom: 48px;
    letter-spacing: 1px;
  }
  .legend {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 40px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: #94a3b8;
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .svg-container {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
    overflow: visible;
  }
  svg.main-chart {
    width: 100%;
    display: block;
    overflow: visible;
  }
  .node-group {
    cursor: pointer;
  }
  .node-group:hover .node-box {
    filter: drop-shadow(0 0 10px currentColor) drop-shadow(0 0 20px currentColor);
  }
  .node-info {
    font-size: 9px;
    fill: #64748b;
    pointer-events: none;
  }
  .node-info-org {
    fill: #94a3b8;
    font-weight: 600;
  }
  .node-info-effect {
    fill: #86efac;
  }
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #161b27;
    border: 1px solid #2d3748;
    border-radius: 16px;
    max-width: 680px;
    width: 90%;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header {
    padding: 20px 24px;
    border-bottom: 1px solid #1e293b;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .modal-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
    flex: 1;
  }
  .modal-date {
    font-size: 12px;
    color: #64748b;
    font-family: monospace;
  }
  .modal-close {
    width: 32px; height: 32px;
    border: none;
    background: #1e293b;
    border-radius: 8px;
    color: #94a3b8;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .modal-close:hover { background: #334155; color: #e2e8f0; }
  .modal-body { padding: 20px 24px; }
  .modal-org {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .modal-section { margin-bottom: 16px; }
  .modal-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
  }
  .modal-section-content {
    font-size: 14px;
    line-height: 1.7;
    color: #cbd5e1;
  }
  .modal-section-content code {
    background: #1e293b;
    padding: 2px 6px;
    border-radius: 4px;
    font-family: 'SF Mono', monospace;
    font-size: 12px;
    color: #a5b4fc;
  }
  .modal-paper {
    background: #1e293b;
    border-radius: 10px;
    padding: 14px 16px;
    margin-top: 8px;
  }
  .modal-paper-title {
    font-size: 13px;
    color: #e2e8f0;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .modal-paper-meta {
    font-size: 11px;
    color: #64748b;
    margin-bottom: 8px;
  }
  .modal-paper-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #60a5fa;
    text-decoration: none;
    padding: 6px 12px;
    background: rgba(59,130,246,0.15);
    border-radius: 6px;
    transition: background 0.15s;
  }
  .modal-paper-link:hover { background: rgba(59,130,246,0.25); }
  .effect-tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 5px;
    margin-right: 6px;
    margin-bottom: 6px;
  }
  .effect-good {
    background: rgba(34,197,94,0.15);
    color: #86efac;
    border: 1px solid rgba(34,197,94,0.3);
  }
</style>

function openModal(id) {
  const data = nodeData[id];
  if (!data) return;
  document.getElementById('modalDot').style.background = data.color;
  document.getElementById('modalTitle').textContent = data.name;
  document.getElementById('modalDate').textContent = data.date;
  document.getElementById('modalOrg').textContent = data.org;
  document.getElementById('modalPrinciple').innerHTML = data.principle;
  const effectsHtml = data.effects.map(e => '<span class="effect-tag effect-good">' + e + '</span>').join('');
  document.getElementById('modalEffects').innerHTML = effectsHtml;
  const paper = data.paper;
  const arxivLink = paper.arxiv ? '<a class="modal-paper-link" href="https://arxiv.org/abs/' + paper.arxiv + '" target="_blank">📄 arXiv:' + paper.arxiv + '</a>' : '';
  document.getElementById('modalPaper').innerHTML = '<div class="modal-paper-title">' + paper.title + '</div><div class="modal-paper-meta">' + paper.authors + ' · ' + paper.venue + '</div>' + arxivLink;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.querySelectorAll('.node-group').forEach(function(node) {
  node.addEventListener('click', function() { openModal(node.dataset.id); });
});

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target.id === 'modalOverlay') closeModal();
});
</script>
